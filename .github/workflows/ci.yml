name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build and test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run tests
        run: |
          xcodebuild \
            -project OneClock.xcodeproj \
            -scheme OneClock \
            -configuration Debug \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            test
